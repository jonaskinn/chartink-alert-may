<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Other Premium Services | notifyu.me</title>
    <style>
        :root {
            --bg-main: #ffffff;
            --bg-offset: #f8fafc;
            --text-main: #0f172a;
            --text-dim: #475569;
            --accent-pink: #ff69b4;
            --accent-blue: #38bdf8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); line-height: 1.6; }

        .container { max-width: 900px; margin: 0 auto; padding: 2rem; }

        nav { padding: 1rem 0 3rem; display: flex; align-items: center; }
        .back-home { color: var(--text-dim); text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: color 0.2s; }
        .back-home:hover { color: var(--accent-pink); }

        h1 { margin-bottom: 3rem; font-size: 2.5rem; text-align: center; font-weight: 800; letter-spacing: -0.02em; }

        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; }

        .service-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .service-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-blue);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        /* Adjusted image display container */
        .service-img {
            width: 100%;
            height: 180px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-offset);
        }

        .service-img img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Keeps image proportions clean */
        }

        .service-info { padding: 1.5rem; text-align: center; }
        .service-info h3 { margin-bottom: 0.5rem; color: var(--text-main); font-size: 1.25rem; }
        .service-info p { color: var(--text-dim); font-size: 0.95rem; }
    </style>
</head>
<body>
<div class="container">
    <nav>
        <a href="/" class="back-home">← Back to notifyu.me</a>
    </nav>

    <h1>Premium Services</h1>

    <div class="services-grid">
        <a href="/linkedin-premium.html" class="service-card">
            <div class="service-img">
                <img src="/linkedin-banner.png" alt="LinkedIn Premium">
            </div>
            <div class="service-info">
                <h3>LinkedIn Premium</h3>
                <p>Career Plan - 3 Months Access</p>
            </div>
        </a>

        <a href="/coursera-plus.html" class="service-card">
            <div class="service-img">
                <img src="/coursera-banner.png" alt="Coursera Plus">
            </div>
            <div class="service-info">
                <h3>Coursera Plus</h3>
                <p>1-Year Access (1-Month Warranty)</p>
            </div>
        </a>
    </div>
</div>
</body>
</html>
